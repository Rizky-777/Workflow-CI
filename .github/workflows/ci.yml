name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: '3.9'
          miniconda-version: latest
          channels: conda-forge
          channel-priority: true

      - name: Create Conda Environment from conda.yaml
        shell: bash -l {0}
        run: |
          cd MLProject
          conda env create -f conda.yaml -n credit_scoring_env

      - name: Menjalankan Script Pelatihan Model dengan MLflow
        shell: bash -l {0}
        run: |
          conda activate credit_scoring_env
          cd MLProject
          mlflow run . --experiment-name "Eksperimen_Credit_Scoring_Rizky"